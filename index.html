<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EventOps Check-In</title>

<style>
body { font-family: Arial; background:#f5f6f8; padding:30px; }

.stats { display:flex; gap:10px; margin:15px 0; }
.card { background:#eee; padding:15px; border-radius:10px; flex:1; text-align:center; }

input, select {
  padding:10px; border-radius:8px; border:1px solid #ccc;
  margin:10px 0; width:300px;
}

.result {
  padding:12px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}

#modal {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:20px;
  width:420px;
  border-radius:16px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.close-btn {
  position:absolute;
  top:12px;
  right:16px;
  cursor:pointer;
  font-size:20px;
}

.row { display:flex; justify-content:space-between; margin:6px 0; }

.days { display:flex; gap:10px; flex-wrap:wrap; margin-top:15px; }

.day {
  padding:12px;
  border-radius:12px;
  background:#f5c6c6;
  font-weight:bold;
  min-width:70px;
  text-align:center;
}

.day.active { border:2px solid black; }
.day.present { background:#b7e1cd; }

button {
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  margin-top:20px;
  font-size:16px;
  cursor:pointer;
}

.checkin { background:#ddd; }
.undo { background:#dc3545; color:white; }

</style>
</head>

<body>

<h1>EventOps Check-In</h1>

<select id="daySelect">
<option value="1">Day 1</option>
<option value="2">Day 2</option>
<option value="3">Day 3</option>
<option value="4">Day 4</option>
<option value="5">Day 5</option>
</select>

<div class="stats">
<div class="card">Total<br><span id="total">0</span></div>
<div class="card">Present<br><span id="present">0</span></div>
<div class="card">No Show<br><span id="noshow">0</span></div>
<div class="card">%<br><span id="percent">0%</span></div>
</div>

<input id="search" placeholder="Search...">
<div id="results"></div>

<div id="modal">
<span class="close-btn" onclick="closeModal()">✖</span>

<div class="row"><b>Unique ID:</b><span id="m_id"></span></div>
<div class="row"><b>Name:</b><span id="m_name"></span></div>
<div class="row"><b>Company:</b><span id="m_company"></span></div>
<div class="row"><b>ASN:</b><span id="m_asn"></span></div>
<div class="row"><b>Shirt:</b><span id="m_shirt"></span></div>

<div class="days" id="daysContainer"></div>

<button id="actionBtn"></button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyn6wx4nZL9J0kkqvN7SHo4xnHUyVsbdZPTvoooiGjxuVOiSpNgS0K22dsR2yFT-afHhQ/exec";

let USERS = [];
let CURRENT = null;

window.onload = () => {
  loadData();
  setInterval(loadData, 5000);
};

async function loadData(){
  const res = await fetch(API_URL);
  USERS = await res.json();
  updateDashboard();
}

function updateDashboard(){
  const day = daySelect.value;
  let total=0, present=0;

  USERS.forEach(u=>{
    const allowed = (u.allowed_days||"1,2,3,4,5").split(",");
    if(!allowed.includes(day)) return;

    total++;
    if(u["day"+day]==="Present") present++;
  });

  totalEl.innerText=total;
  presentEl.innerText=present;
  noshow.innerText=total-present;
  percent.innerText= total?Math.round(present/total*100)+"%":"0%";
}

daySelect.onchange=updateDashboard;

search.oninput = function(){
  const v=this.value.toLowerCase();

  const list=USERS.filter(u=>
    (u.first_name||"").toLowerCase().includes(v)||
    (u.last_name||"").toLowerCase().includes(v)||
    (u.nick_name||"").toLowerCase().includes(v)||
    (u.email||"").toLowerCase().includes(v)
  );

  results.innerHTML="";
  list.forEach(u=>{
    let d=document.createElement("div");
    d.className="result";
    d.innerText=u.id+" - "+u.first_name+" "+u.last_name;
    d.onclick=()=>openModal(u);
    results.appendChild(d);
  });
};

function openModal(u){
  CURRENT=u;

  m_id.innerText=u.id;
  m_name.innerText=u.first_name+" "+u.last_name+" ("+u.nick_name+")";
  m_company.innerText=u.company;
  m_asn.innerText=u.asn;
  m_shirt.innerText=u.shirt;

  const day=daySelect.value;
  const allowed=(u.allowed_days||"1,2,3,4,5").split(",");

  let html="";
  for(let i=1;i<=5;i++){
    if(!allowed.includes(String(i))) continue;

    let cls="day";
    if(i==day) cls+=" active";
    if(u["day"+i]==="Present") cls+=" present";

    html+=`<div class="${cls}">Day ${i} ${u["day"+i]==="Present"?"✓":"✖"}</div>`;
  }

  daysContainer.innerHTML=html;

  if(u["day"+day]==="Present"){
    actionBtn.innerText="Undo (Admin)";
    actionBtn.className="undo";
    actionBtn.onclick=undo;
  } else {
    actionBtn.innerText="Check In";
    actionBtn.className="checkin";
    actionBtn.onclick=checkin;
  }

  modal.style.display="block";
}

function closeModal(){ modal.style.display="none"; }

async function checkin(){
  await fetch(API_URL,{method:"POST",body:JSON.stringify({
    action:"checkin", id:CURRENT.id, day:daySelect.value
  })});
  loadData(); closeModal();
}

async function undo(){
  const pin=prompt("Admin PIN:");
  if(!pin) return;

  await fetch(API_URL,{method:"POST",body:JSON.stringify({
    action:"undo", id:CURRENT.id, day:daySelect.value, pin
  })});
  loadData(); closeModal();
}
</script>

</body>
</html>
