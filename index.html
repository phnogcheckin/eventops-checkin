<!DOCTYPE html>
<html>
<head>
  <title>EventOps Check-In</title>
  <style>
    body { font-family: Arial; padding:20px; }

.result-item {
  padding:12px;
  border:1px solid #ddd;
  margin-top:5px;
  cursor:pointer;
  border-radius:6px;
}

#modal {
  display:none;
  position:fixed;
  top:8%;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:25px;
  width:420px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.row {
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

#days {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

.day-btn {
  flex:1;
  padding:15px;
  border-radius:10px;
  border:none;
  font-weight:bold;
}

.green {
  background:#b7d3c1;
}

.red {
  background:#e7bcbc;
}

.selected {
  border:2px solid black;
}

#actionBtn {
  width:100%;
  padding:15px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}
  </style>
</head>

<body>

<h2>EventOps Check-In</h2>

Day:
<select id="daySelect" onchange="loadDashboard()">
  <option value="0">Day 1</option>
  <option value="1">Day 2</option>
  <option value="2">Day 3</option>
  <option value="3">Day 4</option>
  <option value="4">Day 5</option>
</select>

<div style="display:flex; gap:10px; margin:20px 0;">
  <div>Total: <span id="total">0</span></div>
  <div>Present: <span id="present">0</span></div>
  <div>No Show: <span id="noshow">0</span></div>
  <div>%: <span id="percent">0</span></div>
</div>

<input type="text" id="search" placeholder="Search..." oninput="handleSearch()" style="width:300px;padding:10px;">

<div id="results"></div>

<!-- MODAL -->
<div id="modal">
  <div style="display:flex; justify-content:space-between;">
    <h3>Details</h3>
    <span onclick="closeModal()" style="cursor:pointer;font-size:20px;">✖</span>
  </div>

  <div class="row"><b>Unique ID:</b><span id="m_id"></span></div>
  <div class="row"><b>Name:</b><span id="m_name"></span></div>
  <div class="row"><b>Company:</b><span id="m_company"></span></div>
  <div class="row"><b>ASN:</b><span id="m_asn"></span></div>
  <div class="row"><b>Shirt:</b><span id="m_shirt"></span></div>

  <div id="days"></div>

  <button id="actionBtn"></button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyn6wx4nZL9J0kkqvN7SHo4xnHUyVsbdZPTvoooiGjxuVOiSpNgS0K22dsR2yFT-afHhQ/exec";

let attendees = [];
let selected = null;

/*************************************************
 LOAD DATA
*************************************************/
function init() {
  fetch(`${API_URL}?action=getAllAttendees`)
    .then(r => r.json())
    .then(data => {
      attendees = data;
      loadDashboard();
    });
}

init();

/*************************************************
 SEARCH
*************************************************/
function handleSearch() {
  const q = document.getElementById("search").value.toLowerCase();

  const results = attendees.filter(a =>
    (a.first && a.first.toLowerCase().includes(q)) ||
    (a.last && a.last.toLowerCase().includes(q)) ||
    (a.nick && a.nick.toLowerCase().includes(q)) ||
    (a.email && a.email.toLowerCase().includes(q))
  );

  renderResults(results);
}

function renderResults(list) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  list.forEach(a => {
    const div = document.createElement("div");
    div.className = "result-item";
    div.innerText = `${a.id} - ${a.first} ${a.last}`;
    div.onclick = () => openModal(a);
    container.appendChild(div);
  });
}

/*************************************************
 MODAL
*************************************************/
function openModal(a) {
  selected = a;

  document.getElementById("modal").style.display = "block";

  document.getElementById("m_id").innerText = a.id;
  document.getElementById("m_name").innerText =
    `${a.first} ${a.last} (${a.nick})`;

  document.getElementById("m_company").innerText = a.company || "";
  document.getElementById("m_asn").innerText = a.asn || "";
  document.getElementById("m_shirt").innerText = a.shirt || "";

  renderDays(a);
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/*************************************************
 DAYS
*************************************************/
function renderDays(a) {
  const container = document.getElementById("days");
  container.innerHTML = "";

  const selectedDay = getDay();

  for (let i = 0; i < 5; i++) {
    const btn = document.createElement("button");
    btn.className = "day-btn";

    if (a.days[i] === "Present") {
      btn.classList.add("green");
      btn.innerText = `Day ${i+1} ✓`;
    } else {
      btn.classList.add("red");
      btn.innerText = `Day ${i+1} ✖`;
    }

    if (i === selectedDay) {
      btn.classList.add("selected");
    }

    container.appendChild(btn);
  }

  renderAction(a);
}

/*************************************************
 ACTION BUTTON
*************************************************/
function renderAction(a) {
  const btn = document.getElementById("actionBtn");
  const day = getDay();

  if (a.days[day] === "Present") {
    btn.innerText = "Undo (Admin)";
    btn.style.background = "#dc3545";
    btn.style.color = "white";
    btn.onclick = () => undo(a.id, day);
  } else {
    btn.innerText = "Check In";
    btn.style.background = "#ccc";
    btn.style.color = "black";
    btn.onclick = () => checkIn(a.id, day);
  }
}

/*************************************************
 API CALLS
*************************************************/
function checkIn(id, day) {
  fetch(`${API_URL}?action=checkIn&id=${id}&day=${day}`)
    .then(() => reload());
}

function undo(id, day) {
  fetch(`${API_URL}?action=undo&id=${id}&day=${day}`)
    .then(() => reload());
}

function reload() {
  fetch(`${API_URL}?action=getAllAttendees`)
    .then(r => r.json())
    .then(data => {
      attendees = data;

      // find updated record
      const updated = attendees.find(x => x.id === selected.id);
      selected = updated;

      loadDashboard();
      openModal(updated); // 🔥 THIS FIXES YOUR ISSUE
    });
}

/*************************************************
 DASHBOARD
*************************************************/
function loadDashboard() {
  const day = getDay();

  fetch(`${API_URL}?action=getCounts&day=${day}`)
    .then(r => r.json())
    .then(d => {
      document.getElementById("total").innerText = d.total;
      document.getElementById("present").innerText = d.present;
      document.getElementById("noshow").innerText = d.noShow;
      document.getElementById("percent").innerText = d.percentage;
    });
}

/*************************************************
 HELPERS
*************************************************/
function getDay() {
  return parseInt(document.getElementById("daySelect").value);
}
</script>

</body>
</html>
