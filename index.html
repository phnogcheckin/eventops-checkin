<!DOCTYPE html>
<html>
<head>
<title>EventOps Check-In</title>

<style>
body { font-family: Arial; background:#f5f6f8; padding:20px; }

input {
  padding:10px;
  width:300px;
  border-radius:8px;
  border:1px solid #ccc;
}

.result-item {
  padding:12px;
  margin-top:6px;
  background:white;
  border-radius:8px;
  cursor:pointer;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  top:8%;
  left:50%;
  transform:translateX(-50%);
  background:#f9f9f9;
  padding:20px 25px 25px 25px;
  width:420px;
  border-radius:16px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.close {
  display:flex;
  justify-content:flex-end;
  margin-bottom:10px;
}

.row {
  display:flex;
  gap:10px;
  margin:8px 0;
}

.row b { width:120px; }

#days {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.day-btn {
  flex:1;
  padding:14px;
  border-radius:12px;
  border:none;
  font-weight:bold;
}

.green { background:#c8f2d1; }
.red { background:#f7c6c6; }

.selected { border:2px solid black; }

#actionBtn {
  width:100%;
  padding:15px;
  margin-top:20px;
  border:none;
  border-radius:12px;
  font-size:16px;
}
</style>
</head>

<body>

<h2>EventOps Check-In</h2>

<select id="daySelect" onchange="loadDashboard()">
<option value="0">Day 1</option>
<option value="1">Day 2</option>
<option value="2">Day 3</option>
<option value="3">Day 4</option>
<option value="4">Day 5</option>
</select>

<br><br>

<input id="search" placeholder="Search..." oninput="handleSearch()">

<div id="results"></div>

<!-- MODAL -->
<div id="modal">
  <div class="close">
    <span onclick="closeModal()">✖</span>
  </div>

  <div class="row"><b>Unique ID:</b><span id="m_id"></span></div>
  <div class="row"><b>Name:</b><span id="m_name"></span></div>
  <div class="row"><b>Company:</b><span id="m_company"></span></div>
  <div class="row"><b>ASN:</b><span id="m_asn"></span></div>
  <div class="row"><b>Shirt:</b><span id="m_shirt"></span></div>

  <div id="days"></div>

  <button id="actionBtn"></button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyn6wx4nZL9J0kkqvN7SHo4xnHUyVsbdZPTvoooiGjxuVOiSpNgS0K22dsR2yFT-afHhQ/exec";

let attendees = [];
let selected = null;

function init(){
  fetch(`${API_URL}?action=getAllAttendees`)
  .then(r=>r.json())
  .then(d=>{attendees=d;});
}
init();

/******** SEARCH *********/
function handleSearch(){
  const q = document.getElementById("search").value.toLowerCase();

  const results = attendees.filter(a =>
    (a.first && a.first.toLowerCase().includes(q)) ||
    (a.last && a.last.toLowerCase().includes(q)) ||
    (a.nick && a.nick.toLowerCase().includes(q)) ||
    (a.email && a.email.toLowerCase().includes(q))
  );

  renderResults(results);
}

function renderResults(list){
  const container = document.getElementById("results");
  container.innerHTML = "";

  list.forEach(a=>{
    const div=document.createElement("div");
    div.className="result-item";
    div.innerText=`${a.id} - ${a.first} ${a.last}`;
    div.onclick=()=>openModal(a);
    container.appendChild(div);
  });
}

/******** MODAL *********/
function openModal(a){
  selected=a;

  document.getElementById("modal").style.display="block";

  document.getElementById("m_id").innerText=a.id;
  document.getElementById("m_name").innerText=`${a.first} ${a.last} (${a.nick})`;
  document.getElementById("m_company").innerText=a.company||"";
  document.getElementById("m_asn").innerText=a.asn||"";
  document.getElementById("m_shirt").innerText=a.shirt||"";

  renderDays(a);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/******** DAYS *********/
function renderDays(a){
  const container=document.getElementById("days");
  container.innerHTML="";

  const day=getDay();

  for(let i=0;i<5;i++){
    const btn=document.createElement("button");
    btn.className="day-btn";

    if(a.days[i]==="Present"){
      btn.classList.add("green");
      btn.innerText=`Day ${i+1} ✓`;
    }else{
      btn.classList.add("red");
      btn.innerText=`Day ${i+1} ✖`;
    }

    if(i===day) btn.classList.add("selected");

    container.appendChild(btn);
  }

  renderAction(a);
}

/******** ACTION *********/
function renderAction(a){
  const btn=document.getElementById("actionBtn");
  const day=getDay();

  if(a.days[day]==="Present"){
    btn.innerText="Undo (Admin)";
    btn.style.background="#dc3545";
    btn.style.color="white";
    btn.onclick=()=>undo(a.id,day);
  }else{
    btn.innerText="Check In";
    btn.style.background="#ccc";
    btn.style.color="black";
    btn.onclick=()=>checkIn(a.id,day);
  }
}

/******** API *********/
function checkIn(id,day){
  fetch(`${API_URL}?action=checkIn&id=${id}&day=${day}`)
  .then(()=>reload());
}

function undo(id,day){
  const pin=prompt("Enter Admin PIN:");
  if(!pin) return;

  fetch(`${API_URL}?action=verifyPin&pin=${pin}`)
  .then(r=>r.json())
  .then(res=>{
    if(res.valid){
      fetch(`${API_URL}?action=undo&id=${id}&day=${day}`)
      .then(()=>reload());
    }else{
      alert("Invalid PIN");
    }
  });
}

function reload(){
  fetch(`${API_URL}?action=getAllAttendees`)
  .then(r=>r.json())
  .then(data=>{
    attendees=data;
    const updated=attendees.find(x=>x.id===selected.id);
    selected=updated;
    openModal(updated);
  });
}

function getDay(){
  return parseInt(document.getElementById("daySelect").value);
}
</script>

</body>
</html>
