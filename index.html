<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>EventOps Check-In</title>
  <style>
    body { font-family: Arial; padding:20px; }
    select, input { padding:6px; font-size:14px; }

    .top-bar { display:flex; align-items:center; margin-bottom:20px; }
    .day-group { display:flex; align-items:center; gap:10px; }

    .small-btn {
      padding:6px 12px;
      font-size:13px;
      border:none;
      border-radius:4px;
      cursor:pointer;
      color:white;
      background:#6c757d;
      height:32px;
    }
    .danger { background:#dc3545; }

    .dashboard { display:flex; gap:15px; margin-bottom:20px; }

    .card {
      flex:1;
      padding:15px;
      background:#f1f1f1;
      text-align:center;
      border-radius:6px;
    }

    #searchBox { width:300px; margin-bottom:10px; }

    .result-item {
      padding:10px;
      border:1px solid #ddd;
      margin-bottom:5px;
      cursor:pointer;
      border-radius:4px;
    }

    .modal {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.4);
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:white;
      padding:20px;
      width:500px;
      border-radius:8px;
    }

    .day-box {
      padding:10px;
      margin:4px;
      border-radius:6px;
      text-align:center;
    }

    .present { background:#d4edda; }
    .no-show { background:#f8d7da; }
  </style>
</head>

<body onload="initialize()">

<h2>EventOps Check-In</h2>

<div class="top-bar">
  <div class="day-group">
    <strong>Day:</strong>
    <select id="daySelect" onchange="changeDay()">
      <option value="0">Day 1</option>
      <option value="1">Day 2</option>
      <option value="2">Day 3</option>
      <option value="3">Day 4</option>
      <option value="4">Day 5</option>
    </select>
  </div>
</div>

<div class="dashboard">
  <div class="card">Total<strong id="total">0</strong></div>
  <div class="card">Present<strong id="present">0</strong></div>
  <div class="card">No Show<strong id="noShow">0</strong></div>
  <div class="card">%<strong id="percentage">0%</strong></div>
</div>

<input id="searchBox" placeholder="Search..." oninput="search()" />
<div id="results"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyn6wx4nZL9J0kkqvN7SHo4xnHUyVsbdZPTvoooiGjxuVOiSpNgS0K22dsR2yFT-afHhQ/exec";

let currentDay = 0;
let attendees = [];

function initialize(){
  loadAttendees();
  refreshDashboard();
}

function loadAttendees(){
  fetch(API_URL + "?action=getAllAttendees")
    .then(res => res.json())
    .then(data => {
      attendees = data;
    });
}

function refreshDashboard(){
  fetch(API_URL + "?action=getCounts&day=" + currentDay)
    .then(res => res.json())
    .then(data => {
      document.getElementById("total").innerText = data.total;
      document.getElementById("present").innerText = data.present;
      document.getElementById("noShow").innerText = data.noShow;
      document.getElementById("percentage").innerText = data.percentage + "%";
    });
}

function search(){
  const q = document.getElementById("searchBox").value.toLowerCase();
  const container = document.getElementById("results");
  container.innerHTML = "";

  attendees.filter(a =>
    a.id.toLowerCase().includes(q) ||
    a.name.toLowerCase().includes(q)
  ).forEach(a => {
    const div = document.createElement("div");
    div.className = "result-item";
    div.innerText = a.id + " - " + a.name;
    div.onclick = () => checkIn(a.id);
    container.appendChild(div);
  });
}

function checkIn(id){
  fetch(API_URL + "?action=checkIn&id=" + id + "&day=" + currentDay)
    .then(res => res.text())
    .then(msg => {
      alert(msg);
      refreshDashboard();
      loadAttendees();
    })
    .catch(err => alert("Error: " + err.message));
}

function changeDay(){
  currentDay = parseInt(document.getElementById("daySelect").value);
  refreshDashboard();
}
</script>

</body>
</html>
